<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact Me</title>
</head>
<body>
    <main class="main-container">
        <img src="profile.jpg" alt="Profile" class="profile-small">
        <h2 class="section-title">Contact Me</h2>
        <div class="info-card">
            <p>May tanong ka ba? Mag-email sa: <strong>joliemarrivera@gmail.com</strong></p>
            <form class="contact-form" style="margin-top: 20px;">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea rows="4" placeholder="Your Message" required></textarea>
                <button type="submit" class="btn-primary">Send Message</button>
            </form>
        </div>
        <a href="index.html" class="btn-primary btn-outline">Back to Home</a>
    </main>
</body>
</html>
